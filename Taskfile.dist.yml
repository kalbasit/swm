version: "3"

includes:
  proto:
    taskfile: ./proto/tasks.yml
    dir: ./proto
  sdk:
    taskfile: ./sdk/go/tasks.yml
    dir: ./sdk/go
  swm:
    taskfile: ./cmd/swm/tasks.yml
    dir: ./cmd/swm
  vcs-git:
    taskfile: ./plugins/vcs-git/tasks.yml
    dir: ./plugins/vcs-git
  session-tmux:
    taskfile: ./plugins/session-tmux/tasks.yml
    dir: ./plugins/session-tmux
  picker-fzf:
    taskfile: ./plugins/picker-fzf/tasks.yml
    dir: ./plugins/picker-fzf
  forge-github:
    taskfile: ./plugins/forge-github/tasks.yml
    dir: ./plugins/forge-github

set:
  - errexit
  - nounset
  - pipefail

tasks:
  default:
    cmds:
      - task --list
    silent: true

  fmt:
    desc: Format all files (Nix, Go, YAML, Markdown) via treefmt
    cmds:
      - nix fmt

  lint:
    desc: Lint all modules (sequential — golangci-lint uses a file lock)
    cmds:
      - task: proto:lint
      - task: sdk:lint
      - task: swm:lint
      - task: vcs-git:lint
      - task: session-tmux:lint
      - task: picker-fzf:lint
      - task: forge-github:lint

  update-nix-vendor-hashes:
    desc: Re-compute and update vendorHash for all nix Go packages (run after any proto/ changes)
    cmds:
      - |
        for pkg in swm swm-plugin-forge-github swm-plugin-picker-fzf swm-plugin-session-tmux swm-plugin-vcs-git; do
          set +e
          nix build --print-build-logs ".#${pkg}.goModules" 2>/tmp/nix-vendor-hash-log
          ret=$?
          set -e

          if [[ "$ret" -eq 0 ]]; then
            set +e
            nix build --print-build-logs ".#${pkg}.goModules" --rebuild 2>/tmp/nix-vendor-hash-log
            ret=$?
            set -e
          fi

          if [[ "$ret" -eq 0 ]]; then
            echo "vendorHash up to date for $pkg"
            continue
          fi

          hash="$(grep 'got:' /tmp/nix-vendor-hash-log | awk '{print $2}')"
          if [[ -z "$hash" ]]; then
            cat /tmp/nix-vendor-hash-log
            echo "ERROR: could not extract hash for $pkg"
            exit 1
          fi

          echo "Updating vendorHash for $pkg → $hash"
          sed -e "s#vendorHash =.*\$#vendorHash = \"${hash}\";#g" -i "nix/packages/${pkg}/default.nix"
        done

  test:
    desc: Run all module tests in dependency order
    cmds:
      - task: proto:test
      - task: sdk:test
      - task: swm:test
      - task: vcs-git:test
      - task: session-tmux:test
      - task: picker-fzf:test
      - task: forge-github:test
