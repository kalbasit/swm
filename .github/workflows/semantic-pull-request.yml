name: "Lint PR"
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main
      - "release-*"
permissions:
  pull-requests: read
jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
